<!DOCTYPE html>
<html>
<head>
    <title>Three Types of Functions</title>
</head>
<body>

    <h2>JavaScript Function Types</h2>

    <button onclick="greet()">Call Function Declaration</button>
    <button onclick="sayGoodbye()">Call Function Expression</button>
    <button onclick="showThanks()">Call Arrow Function</button>

    <p id="output"></p>

    <script>
        // Function Declaration
        function greet() {
            document.getElementById("output").textContent =
                "Hello from Function Declaration!";
        }

        // Function Expression
        const sayGoodbye = function () {
            document.getElementById("output").textContent =
                "Goodbye from Function Expression!";
        };

        // Arrow Function
        const showThanks = () => {
            document.getElementById("output").textContent =
                "Thanks from Arrow Function!";
        };
    </script>

</body>
</html>
